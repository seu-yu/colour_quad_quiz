<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colour Quad Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0d;--surface:#1a1917;--card:#211f1d;
  --border:rgba(255,255,255,0.07);--text:#f0ede8;
  --text-muted:rgba(240,237,232,0.45);--accent:#c8a882;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --correct:#6dbb8a;--wrong:#cc6e6e;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}

.nav{display:flex;align-items:center;padding:0 1.5rem;height:52px;
  background:rgba(15,14,13,0.92);backdrop-filter:blur(10px);
  border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:50}
.nav-logo{font-family:var(--serif);font-size:13px;letter-spacing:.14em;color:var(--text-muted)}
.nav-logo span{color:var(--text);font-weight:500}

.screen{display:none;flex-direction:column;align-items:center;min-height:calc(100vh - 52px)}
.screen.active{display:flex}

/* ── START ── */
#screen-start{justify-content:center;padding:2rem 1.5rem}
.start-inner{width:100%;max-width:420px;display:flex;flex-direction:column;gap:1.6rem}
.start-title{font-family:var(--serif);font-size:32px;font-weight:300;letter-spacing:.08em}
.start-title span{color:var(--accent)}
.start-sub{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:.1em}
.start-desc{font-family:var(--sans);font-size:13px;color:var(--text);line-height:1.9;letter-spacing:.01em}
.btn-primary{width:100%;padding:15px;border-radius:12px;background:var(--accent);color:var(--bg);
  border:none;font-family:var(--mono);font-size:11px;letter-spacing:.08em;cursor:pointer;
  transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.start-note{font-family:var(--mono);font-size:9px;color:var(--text-muted);line-height:1.9;
  letter-spacing:.04em;border-top:0.5px solid var(--border);padding-top:1.2rem}

/* ── QUIZ ── */
#screen-quiz{padding-bottom:2rem}
.progress-bar{width:100%;max-width:420px;height:2px;background:var(--border);margin:4px auto 0}
.progress-fill{height:100%;background:var(--accent);transition:width .4s ease;width:0%}
.phase-header{width:100%;max-width:420px;display:flex;align-items:center;
  justify-content:space-between;padding:1.2rem 1.5rem .6rem}
.phase-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--accent)}
.phase-progress{font-family:var(--mono);font-size:10px;color:var(--text-muted)}

.card-wrap{display:flex;align-items:center;justify-content:center;padding:.8rem 1.5rem 0;width:100%}

/* パレットカード：4色を高彩度→低彩度の順に横1列 */
.palette-card{
  width:100%;max-width:360px;
  border-radius:20px;overflow:hidden;
  border:0.5px solid var(--border);background:var(--card);
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  display:flex;flex-direction:row;
  height:180px;
  animation:cardIn .25s ease
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.swatch-col{flex:1;height:100%;transition:filter .2s}

.question-wrap{width:100%;max-width:360px;padding:.8rem 1.5rem 0}
.question-text{font-family:var(--serif);font-size:18px;font-weight:300;letter-spacing:.04em;
  color:var(--text-muted);line-height:1.5}
.question-text em{color:var(--text);font-style:normal}

/* 選択肢 */
.options-wrap{width:100%;max-width:360px;padding:.8rem 1.5rem 0;display:flex;flex-direction:column;gap:8px}
.opt-btn{
  width:100%;padding:13px 16px;border-radius:12px;
  border:0.5px solid var(--border);background:var(--card);
  font-family:var(--mono);font-size:11px;letter-spacing:.03em;
  color:var(--text-muted);cursor:pointer;text-align:left;
  transition:all .15s;display:flex;align-items:center;gap:10px
}
.opt-btn:not([disabled]):hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.opt-btn .opt-swatches{display:flex;gap:3px;flex-shrink:0}
.opt-btn .opt-swatch{width:10px;height:10px;border-radius:2px}
.opt-btn .opt-label{flex:1}
.opt-btn.correct{border-color:var(--correct);color:var(--correct);background:rgba(109,187,138,.08)}
.opt-btn.wrong{border-color:var(--wrong);color:var(--wrong);background:rgba(204,110,110,.08)}
.opt-btn.dimmed{opacity:.35}

/* フィードバック */
.feedback-wrap{width:100%;max-width:360px;padding:.8rem 1.5rem 0;min-height:40px}
.feedback-text{font-family:var(--mono);font-size:10px;letter-spacing:.06em;line-height:1.8;
  padding:10px 14px;border-radius:10px;background:var(--card)}
.feedback-text.correct{color:var(--correct);border:0.5px solid rgba(109,187,138,.3)}
.feedback-text.wrong{color:var(--wrong);border:0.5px solid rgba(204,110,110,.3)}

.next-wrap{width:100%;max-width:360px;padding:.8rem 1.5rem 0}
.btn-next{width:100%;padding:13px;border-radius:12px;background:var(--accent);color:var(--bg);
  border:none;font-family:var(--mono);font-size:11px;letter-spacing:.06em;cursor:pointer;
  transition:opacity .15s;opacity:0;pointer-events:none}
.btn-next.visible{opacity:1;pointer-events:auto}
.btn-next:hover{opacity:.85}

/* ── RESULT ── */
#screen-result{justify-content:center;padding:2rem 1.5rem}
.result-inner{width:100%;max-width:420px;display:flex;flex-direction:column;gap:1.6rem}
.result-score-wrap{display:flex;align-items:baseline;gap:.4rem}
.result-score{font-family:var(--serif);font-size:56px;font-weight:300;letter-spacing:.02em;color:var(--accent)}
.result-score-denom{font-family:var(--serif);font-size:28px;font-weight:300;color:var(--text-muted)}
.result-title{font-family:var(--serif);font-size:22px;font-weight:300;letter-spacing:.06em}
.result-comment{font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:.05em;line-height:1.9}

/* ログ */
.result-log{display:flex;flex-direction:column;gap:8px}
.result-log-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;
  color:var(--text-muted);text-transform:uppercase;margin-bottom:.2rem}
.log-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;background:var(--card);border:0.5px solid var(--border)}
.log-mark{font-family:var(--mono);font-size:12px;flex-shrink:0;width:16px;text-align:center}
.log-mark.c{color:var(--correct)}.log-mark.w{color:var(--wrong)}
.log-palette{display:flex;gap:2px;flex-shrink:0}
.log-swatch{width:10px;height:10px;border-radius:2px}
.log-info{flex:1;min-width:0}
.log-name{font-family:var(--serif);font-size:13px;font-weight:300;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-brand{font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:var(--text-muted)}

.share-block{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:1.2rem}
.share-label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;
  color:var(--text-muted);text-transform:uppercase;margin-bottom:.8rem}
.share-text{font-family:var(--mono);font-size:11px;color:var(--text);
  line-height:1.9;white-space:pre-wrap;letter-spacing:.02em}
.btn-copy{margin-top:1rem;width:100%;padding:11px;border-radius:10px;
  border:0.5px solid var(--border);background:none;color:var(--text-muted);
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.btn-copy:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-copy.copied{color:var(--accent);border-color:var(--accent)}
.result-btns{display:flex;gap:10px}
.btn-retry{flex:1;padding:14px;border-radius:12px;background:var(--accent);color:var(--bg);
  border:none;font-family:var(--mono);font-size:11px;letter-spacing:.06em;cursor:pointer;transition:opacity .15s}
.btn-retry:hover{opacity:.85}
</style>
</head>

<nav class="nav">

<!-- ════ START ════ -->
<div id="screen-start" class="screen active">
  <div class="start-inner">
    <div>
      <div class="start-title"><span>Colour</span> Quad Quiz</div>
      <div class="start-sub" style="margin-top:.3rem">eyeshadow palette quiz</div>
    </div>
    <div class="start-desc">
      パレットの4色を見て、どのブランド・シリーズの何番かを当てるクイズです。<br><br>
      10問出題。全117パレットの中からランダムに出します。
    </div>
    <button class="btn-primary" onclick="startQuiz()">クイズをはじめる →</button>
    <div class="start-note">
      色は公式画像から抽出した近似値です。非公式の個人アプリです。
    </div>
  </div>
</div>

<!-- ════ QUIZ ════ -->
<div id="screen-quiz" class="screen">
  <div class="phase-header">
    <div class="phase-label">Quiz</div>
    <div class="phase-progress" id="quiz-progress-text"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="quiz-progress-fill"></div></div>

  <div class="card-wrap">
    <div class="palette-card" id="quiz-card"></div>
  </div>

  <div class="question-wrap">
    <div class="question-text" id="quiz-question"></div>
  </div>

  <div class="options-wrap" id="quiz-options"></div>

  <div class="feedback-wrap">
    <div class="feedback-text" id="quiz-feedback" style="display:none"></div>
  </div>

  <div class="next-wrap">
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題 →</button>
  </div>
</div>

<!-- ════ RESULT ════ -->
<div id="screen-result" class="screen">
  <div class="result-inner">
    <div>
      <div class="result-score-wrap">
        <div class="result-score" id="result-score">0</div>
        <div class="result-score-denom">/ 10</div>
      </div>
      <div class="result-title" id="result-title"></div>
    </div>
    <div class="result-comment" id="result-comment"></div>
    <div class="result-log">
      <div class="result-log-label">全問振り返り</div>
      <div id="result-log-items"></div>
    </div>
    <div class="share-block">
      <div class="share-label">share</div>
      <div class="share-text" id="result-share-text"></div>
      <button class="btn-copy" id="btn-copy">コピー</button>
    </div>
    <div class="result-btns">
      <button class="btn-retry" onclick="startQuiz()">もう一度挑戦する</button>
    </div>
  </div>
</div>

// ── HSV彩度計算 ──
function hexToSaturation(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  if(max === 0) return 0;
  return (max - min) / max;
}

// 4色を高彩度→低彩度で並べ替え
function sortBySaturation(colors) {
  return [...colors].sort((a,b) => hexToSaturation(b) - hexToSaturation(a));
}

// ── Quiz state ──
const TOTAL_Q = 10;
let questions = [], currentQ = 0, score = 0;
let answered = false;
let quizLog = [];

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// クイズタイプをランダムに決める: 'name'=パレット名当て, 'brand'=ブランド当て
function makeQuestions() {
  const pool = shuffle(PALETTES).slice(0, TOTAL_Q);
  return pool.map((correct, qi) => {
    const type = Math.random() < 0.6 ? 'name' : 'brand';
    // 誤答候補を作る
    let wrongPool;
    if(type === 'name') {
      // 同ブランドから優先、なければ他から
      const sameBrand = PALETTES.filter(p => p.brand === correct.brand && p.name !== correct.name);
      const others = PALETTES.filter(p => p.name !== correct.name);
      const candidates = shuffle(sameBrand.length >= 3 ? sameBrand : others);
      wrongPool = candidates.slice(0, 3);
    } else {
      // brandクイズ：ブランドが異なるものから3択
      const diff = PALETTES.filter(p => p.brand !== correct.brand);
      const uniqueBrands = [...new Set(diff.map(p=>p.brand))];
      wrongPool = shuffle(uniqueBrands).slice(0,3).map(b => PALETTES.find(p=>p.brand===b));
    }
    const options = shuffle([correct, ...wrongPool]);
    return { correct, options, type };
  });
}

function startQuiz() {
  questions = makeQuestions();
  currentQ = 0; score = 0; quizLog = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function renderQuestion() {
  const {correct, options, type} = questions[currentQ];
  answered = false;

  // progress
  const pct = (currentQ / TOTAL_Q) * 100;
  document.getElementById('quiz-progress-fill').style.width = pct + '%';
  document.getElementById('quiz-progress-text').textContent = `${currentQ+1} / ${TOTAL_Q}`;

  // palette card（高彩度→低彩度に横並び）
  const sortedColors = sortBySaturation(correct.colors);
  const card = document.getElementById('quiz-card');
  card.innerHTML = sortedColors.map(c => `<div class="swatch-col" style="background:${c}"></div>`).join('');

  // question text
  const qEl = document.getElementById('quiz-question');
  if(type === 'name') {
    qEl.innerHTML = `<em>${correct.brand}</em> の<br>どのパレット？`;
  } else {
    qEl.innerHTML = `このパレットはどの<br><em>ブランド</em>？`;
  }

  // options
  const optWrap = document.getElementById('quiz-options');
  optWrap.innerHTML = '';
  options.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    const isCorrectOpt = (p.brand === correct.brand && p.name === correct.name);

    if(type === 'name') {
      // パレット名当て：ミニスウォッチ + 名前
      const swatchHtml = sortBySaturation(p.colors).map(c=>`<div class="opt-swatch" style="background:${c}"></div>`).join('');
      btn.innerHTML = `<div class="opt-swatches" style="visibility:hidden">${swatchHtml}</div><div class="opt-label">${p.name}${p.no ? ' <span style="color:var(--text-muted);font-size:9px">No.'+p.no+'</span>' : ''}</div>`;
    } else {
      // ブランド当て：ブランド名
      btn.innerHTML = `<div class="opt-label">${p.brand}</div>`;
    }
    btn.dataset.correct = isCorrectOpt ? '1' : '0';
    btn.addEventListener('click', () => handleAnswer(btn, isCorrectOpt, correct));
    optWrap.appendChild(btn);
  });

  // feedback / next reset
  const fb = document.getElementById('quiz-feedback');
  fb.style.display = 'none';
  fb.className = 'feedback-text';
  const btn = document.getElementById('btn-next');
  btn.classList.remove('visible');
  btn.textContent = currentQ < TOTAL_Q - 1 ? '次の問題 →' : '結果を見る →';
}

function handleAnswer(clickedBtn, isCorrect, correct) {
  if(answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    // スウォッチを表示
    const sw = b.querySelector('.opt-swatches');
    if(sw) sw.style.visibility = 'visible';
    if(b.dataset.correct === '1') b.classList.add('correct');
    else if(b === clickedBtn && !isCorrect) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });

  if(isCorrect) score++;
  quizLog.push({ correct, isCorrect });

  const fb = document.getElementById('quiz-feedback');
  fb.style.display = 'block';
  if(isCorrect) {
    fb.classList.add('correct');
    fb.textContent = `正解！ ${correct.brand} ${correct.line} No.${correct.no} — ${correct.name}`;
  } else {
    fb.classList.add('wrong');
    fb.textContent = `不正解。正解は ${correct.brand} "${correct.name}" (No.${correct.no}) でした。`;
  }

  document.getElementById('btn-next').classList.add('visible');
}

function nextQuestion() {
  currentQ++;
  if(currentQ >= TOTAL_Q) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-progress-fill').style.width = '100%';
  showScreen('screen-result');

  document.getElementById('result-score').textContent = score;

  const pct = score / TOTAL_Q;
  let title, comment;
  if(pct === 1) {
    title = 'パーフェクト 🎉';
    comment = '全問正解！アイシャドウへの愛と知識が溢れていますね。';
  } else if(pct >= 0.8) {
    title = '上級者';
    comment = 'ほぼ完璧。デパコスの色を見分ける目が鋭い。';
  } else if(pct >= 0.6) {
    title = '中級者';
    comment = '半分以上正解！日ごろからパレットを研究している感じが出ています。';
  } else if(pct >= 0.4) {
    title = 'まだまだこれから';
    comment = 'もう少し！色の微妙な違いを意識してみると正解率が上がるかも。';
  } else {
    title = '初心者';
    comment = 'ブランドごとの色の傾向を覚えていくと得点アップできるはず。';
  }
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-comment').textContent = comment;

  // ログ
  const logEl = document.getElementById('result-log-items');
  logEl.innerHTML = quizLog.map(({correct, isCorrect}) => {
    const sorted = sortBySaturation(correct.colors);
    const swatches = sorted.map(c=>`<div class="log-swatch" style="background:${c}"></div>`).join('');
    return `<div class="log-item">
      <div class="log-mark ${isCorrect?'c':'w'}">${isCorrect?'○':'✕'}</div>
      <div class="log-palette">${swatches}</div>
      <div class="log-info">
        <div class="log-name">${correct.name}</div>
        <div class="log-brand">${correct.brand} / No.${correct.no}</div>
      </div>
    </div>`;
  }).join('');

  // シェアテキスト生成
  const marks = quizLog.map(({isCorrect}) => isCorrect ? '❤️' : '💔').join('');
  const shareLines = [
    `Colour Quad Quiz ${score}/${TOTAL_Q}`,
    marks,
    '',
    '#colour_quad_quiz',
    'https://seu-yu.github.io/colour_quad_quiz/',
  ];
  document.getElementById('result-share-text').textContent = shareLines.join('\n');

  // コピーボタン
  document.getElementById('btn-copy').onclick = () => {
    const txt = document.getElementById('result-share-text').textContent;
    navigator.clipboard.writeText(txt).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = 'コピー済み ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
    });
  };
}
